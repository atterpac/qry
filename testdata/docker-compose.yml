services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "15432:5432"
    environment:
      POSTGRES_USER: qrytest
      POSTGRES_PASSWORD: qrytest
      POSTGRES_DB: qrytest
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qrytest"]
      interval: 2s
      timeout: 5s
      retries: 15

  mysql:
    image: mysql:8.0
    ports:
      - "13306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: qrytest
      MYSQL_USER: qrytest
      MYSQL_PASSWORD: qrytest
      MYSQL_DATABASE: qrytest
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uqrytest", "-pqrytest"]
      interval: 2s
      timeout: 5s
      retries: 15
