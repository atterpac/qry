services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "15432:5432"
    environment:
      POSTGRES_USER: qrytest
      POSTGRES_PASSWORD: qrytest
      POSTGRES_DB: qrytest
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qrytest"]
      interval: 2s
      timeout: 5s
      retries: 15

  postgres-prod:
    image: postgres:16-alpine
    ports:
      - "15433:5432"
    environment:
      POSTGRES_USER: qrytest
      POSTGRES_PASSWORD: qrytest
      POSTGRES_DB: qrytest_prod
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qrytest"]
      interval: 2s
      timeout: 5s
      retries: 15

  surrealdb:
    image: surrealdb/surrealdb:latest
    # `start` runs the server; root/root creds match the seeder + config profile.
    command: start --user root --pass root --bind 0.0.0.0:8000 memory
    ports:
      - "18000:8000"
    healthcheck:
      # The image ships /surreal; isready confirms the RPC endpoint is live.
      test: ["CMD", "/surreal", "isready", "--endpoint", "http://localhost:8000"]
      interval: 2s
      timeout: 5s
      retries: 15

  mysql:
    image: mysql:8.0
    ports:
      - "13306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: qrytest
      MYSQL_USER: qrytest
      MYSQL_PASSWORD: qrytest
      MYSQL_DATABASE: qrytest
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uqrytest", "-pqrytest"]
      interval: 2s
      timeout: 5s
      retries: 15
