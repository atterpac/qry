version: "3"

vars:
  COMPOSE_FILE: testdata/docker-compose.yml

tasks:
  testdb-up:
    desc: Start all test containers (Postgres, Postgres-prod, MySQL, SurrealDB)
    cmds:
      - docker compose -f {{.COMPOSE_FILE}} up -d --wait

  testdb-down:
    desc: Stop and remove test containers and volumes
    cmds:
      - docker compose -f {{.COMPOSE_FILE}} down -v

  testdb-seed:
    desc: Seed test databases. Seed a subset with `task testdb-seed -- surrealdb`
    cmds:
      - go run ./testdata/seed/ {{.CLI_ARGS}}

  testdb-reset:
    desc: Tear down, restart, and re-seed all test databases
    cmds:
      - task: testdb-down
      - task: testdb-up
      - sleep 3
      - task: testdb-seed
